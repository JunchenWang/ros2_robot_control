control_node:
  ros__parameters:
    update_rate: 1000
    lock_memory: true
    simulation: false
    sim_real_time: false
    publish_joint_state: false
    robot: hardwares::FC3Robot
    controllers: 
      - controllers::TorqueController
      - controllers::RCMController
      - controllers::JointImpedanceController

FC3Robot:
  ros__parameters:
    robot_ip: 192.168.1.101
    end_effector: ""
    # joint interface:
    joint_command_interface:
      - torque 
    joint_state_interface:
      - position
      - velocity
      - torque
    # other interface:
    command_interface: [mode, pose]
    command_length: [2, 6]
    command_type: [int, double]
    state_interface: [T, c, g, external_torque, success, m]
    state_length: [16, 7, 7, 7, 1, 49]
    state_type: [double, double, double, double, double, double]

JointImpedanceController:
  ros__parameters:
    K: [60.0, 60.0, 60.0, 60.0, 60.0, 60.0, 60.0]
    B: [50.0, 50.0, 50.0, 50.0, 30.0, 25.0, 15.0]